<!DOCTYPE html>
<html>
<head>
  <title>⚖️ Legal AI Agent</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    .topbar {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid #1e293b;
    }

    .topbar input,
    .topbar select {
      background: #1e293b;
      border: none;
      padding: 8px;
      border-radius: 6px;
      color: white;
    }

    .topbar button {
      background: #16a34a;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 600px;
      padding: 12px;
      border-radius: 12px;
      animation: fadeIn 0.3s ease;
      white-space: pre-line;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .ai {
      background: #1e293b;
    }

    .input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #1e293b;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #1e293b;
      color: white;
    }

    .input-area button {
      margin-left: 10px;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .high { background: #dc2626; }
    .medium { background: #eab308; color: black; }
    .low { background: #16a34a; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="header">⚖️ Legal AI Agent</div>

  <div class="topbar">
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>

    <select id="persona">
      <option>Tenant</option>
      <option>Landlord</option>
      <option>Employee</option>
      <option>Employer</option>
      <option>Buyer</option>
    </select>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Ask about your document...">
    <button onclick="send()">Send</button>
  </div>

  <script>
    const API = "http://127.0.0.1:8000";

    function addMessage(role, content) {
      const chat = document.getElementById("chat");

      const div = document.createElement("div");
      div.classList.add("msg", role);

      div.innerHTML = content;

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function upload() {
      const file = document.getElementById("file").files[0];

      if (!file) {
        alert("Select a file");
        return;
      }

      const form = new FormData();
      form.append("file", file);

      await fetch(API + "/upload", {
        method: "POST",
        body: form
      });

      alert("✅ Document processed!");
    }

    function formatAI(text) {
      // Convert plain text to styled HTML
      let html = text
        .replace("⚠️ Risk:", '<div class="badge high">HIGH RISK</div><br>')
        .replace("💰 Obligation:", '<div class="badge medium">OBLIGATION</div><br>')
        .replace("📄 Simple Explanation:", "<br><b>📄 Explanation:</b><br>")
        .replace("💡 Recommendation:", "<br><b>💡 Recommendation:</b><br>");

      return html;
    }

    async function send() {
      const input = document.getElementById("input");
      const persona = document.getElementById("persona").value;

      if (!input.value) return;

      addMessage("user", input.value);
      addMessage("ai", "🤖 Thinking...");

      const res = await fetch(API + "/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          query: input.value,
          persona: persona
        })
      });

      const data = await res.json();

      const chat = document.getElementById("chat");
      chat.removeChild(chat.lastChild);

      addMessage("ai", formatAI(data.answer));

      input.value = "";
    }
  </script>

</body>
</html>
